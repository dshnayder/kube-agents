model:
  provider: custom
  model: model-default
  default: model-default
  base_url: http://litellm.agent-system.svc.cluster.local/v1
  api_key: none

mcp_servers:
  developer_knowledge:
    command: "node"
    args:
      - "/opt/mcp-remote/dist/proxy.js"
      - "https://developerknowledge.googleapis.com/mcp"
    timeout: 15

platform_toolsets:
  cli:
    - web
    - browser
    - terminal
    - file
    - code_execution
    - skills
    - todo
    - memory
    - session_search
    - clarify
    - cronjob
    - mcp-developer_knowledge
  api_server:
    - web
    - browser
    - terminal
    - file
    - code_execution
    - skills
    - todo
    - memory
    - session_search
    - clarify
    - cronjob
    - mcp-developer_knowledge

plugins:
  enabled:
    - tool_overrides

thread_sessions_per_user: true
group_sessions_per_user: true

display:
  platforms:
    google_chat:
      # Options:
      # - "all": Show all tool progress steps (recommended)
      # - "new": Only show when a new tool starts
      # - "verbose": Show full progress including arguments
      # - "off": Disable tool progress
      tool_progress: "new"

      # (Optional) Clean up progress bubbles when the turn finishes:
      cleanup_progress: false

memory:
  memory_enabled: true
  user_profile_enabled: true
  provider: mem0

approvals:
  cron_mode: approve

web:
  backend: "ddgs"

auxiliary:
  compression:
    provider: "main"
    model: "model-summary"

thread_sessions_per_user: true
group_sessions_per_user: true
