apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: operator-agent-<CLUSTER_NAME>-<CLUSTER_LOCATION>-role
  labels:
    app: operator-agent-<CLUSTER_NAME>-<CLUSTER_LOCATION>
rules:
  # Cluster-scoped resources (Write & Read)
  - apiGroups: [""]
    resources: ["namespaces", "nodes", "persistentvolumes"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["storage.k8s.io"]
    resources: ["storageclasses"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Namespace infrastructure provisioning (Write & Read)
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["roles", "rolebindings"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["resourcequotas", "limitranges"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Read-only access to all workload resources (for monitoring & health auditing)
  - apiGroups: ["*"]
    resources: ["pods", "pods/log", "deployments", "services", "ingresses", "statefulsets", "daemonsets", "configmaps", "secrets", "events"]
    verbs: ["get", "list", "watch"]
  # Support Config Connector / GKE Hub / Fleet management
  - apiGroups: ["gkehub.cnrm.cloud.google.com", "container.cnrm.cloud.google.com"]
    resources: ["*"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: operator-agent-<CLUSTER_NAME>-<CLUSTER_LOCATION>-binding
  labels:
    app: operator-agent-<CLUSTER_NAME>-<CLUSTER_LOCATION>
subjects:
  - apiGroup: rbac.authorization.k8s.io
    kind: User
    name: <GSA_EMAIL>
  - kind: ServiceAccount
    name: operator-agent-<CLUSTER_NAME>-<CLUSTER_LOCATION>-sa
    namespace: agent-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: operator-agent-<CLUSTER_NAME>-<CLUSTER_LOCATION>-role
